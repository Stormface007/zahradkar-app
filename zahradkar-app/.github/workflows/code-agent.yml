name: AI Code Agent
on:
  workflow_dispatch:
    inputs:
      feature:
        description: 'Feature name'
        required: true
      description:
        description: 'Task description'
        required: true
      files:
        description: 'Files to modify'
        required: true

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Create Feature Files
      run: |
        mkdir -p src/generated
        cat > src/generated/${{ inputs.feature }}.js << EOF
        // Generated by Perplexity AI Agent
        // Feature: ${{ inputs.feature }}
        // Description: ${{ inputs.description }}
        
        export function ${{ inputs.feature.replace('-','_') }}() {
          console.log('AI Agent: ${{ inputs.feature }} loaded');
          // TODO: implementace podle zadání
          return { success: true, message: '${{ inputs.feature }} ready' };
        }
        EOF
        
        echo "Vytvořen soubor src/generated/${{ inputs.feature }}.js"
    
    - name: Commit & Push
      run: |
        git config user.name "Perplexity AI Agent"
        git config user.email "agent@zahradkar.app"
        git checkout -b ai-${{ inputs.feature }}-${{ github.run_id }}
        git add src/generated/
        git commit -m "feat: ${{ inputs.feature }}
        
        ${{ inputs.description }}
        
        Generated by Perplexity AI Agent"
        git push origin HEAD
    
    - name: Create Pull Request
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const pr = await github.rest.pulls.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `🤖 feat: ${{ inputs.feature }}`,
            head: `ai-${{ inputs.feature }}-${context.runId}`,
            base: 'main',
            body: `
            ## AI Generated Feature
            
            **Feature**: ${{ inputs.feature }}
            **Files**: ${{ inputs.files }}
            **Description**: ${{ inputs.description }}
            
            Generated by Perplexity AI Agent via Netlify webhook.
            `
          });
          console.log(`PR created: ${pr.data.html_url}`);

